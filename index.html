<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle Live OBS - 3 Sources Directes</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: transparent;
        }
        .overlay-item {
            width: 1080px;
            height: 1920px;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }
        .active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <iframe id="source1" class="overlay-item" src="24update overlay_live_1080x1920.html"></iframe>

    <img id="source2" class="overlay-item" src="file_00000000c15071f4829de158d17f3c07.png" alt="Transition">

    <iframe id="source3" class="overlay-item" src="https://maxmcneil.github.io/mywebrankin/"></iframe>

    <script>
        const s1 = document.getElementById('source1'); // Dettes
        const s2 = document.getElementById('source2'); // Transition PNG
        const s3 = document.getElementById('source3'); // News directes

        const tempsDettes = 60000;     // 1 minute
        const tempsTransition = 30000; // 30 secondes
        const tempsNews = 180000;      // 3 minutes

        let cycleCount = 0;
        const cyclesBeforeNewsRefresh = 7; // Environ 30 minutes

        function etape1Dettes() {
            console.log("Étape 1 : Affichage Dettes");
            s3.classList.remove('active');
            s1.classList.add('active');

            setTimeout(etape2Transition, tempsDettes);
        }

        function etape2Transition() {
            console.log("Étape 2 : Affichage Transition PNG");
            s1.classList.remove('active');
            s2.classList.add('active');

            setTimeout(etape3News, tempsTransition);
        }

        function etape3News() {
            console.log("Étape 3 : Affichage News");
            s2.classList.remove('active');
            s3.classList.add('active');

            cycleCount++;
            
            // Toutes les 30 minutes environ, on force le rafraîchissement du lien direct
            if (cycleCount >= cyclesBeforeNewsRefresh) {
                console.log("Rafraîchissement du flux de News en direct !");
                s3.src = ""; 
                setTimeout(() => { s3.src = "https://maxmcneil.github.io/mywebrankin/"; }, 100);
                cycleCount = 0; 
            }

            setTimeout(etape1Dettes, tempsNews);
        }

        window.onload = function() {
            etape1Dettes();
        };
    </script>
</body>
</html>

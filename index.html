<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle Source OBS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: transparent;
        }
        iframe {
            width: 1080px;
            height: 1920px;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
        }
        iframe.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <iframe id="source1" src="24update overlay_live_1080x1920.html"></iframe>
    <iframe id="source2" src="file_00000000c15071f4829de158d17f3c07.png"></iframe>
    <iframe id="source3" src="refresh.html"></iframe>

    <script>
        const s1 = document.getElementById('source1'); // Dettes (1 min)
        const s2 = document.getElementById('source2'); // Transition (30 sec)
        const s3 = document.getElementById('source3'); // News (3 min)

        function cycle() {
            // 1. Afficher Source 1 (Dettes) - Masquer le reste
            s3.classList.remove('active');
            s1.classList.add('active');

            // Attendre 1 minute (60 000 ms)
            setTimeout(() => {
                
                // 2. Afficher Source 2 (Transition)
                s1.classList.remove('active');
                s2.classList.add('active');

                // Attendre 30 secondes (30 000 ms)
                setTimeout(() => {
                    
                    // 3. Afficher Source 3 (News)
                    s2.classList.remove('active');
                    s3.classList.add('active');

                    // Attendre 3 minutes (180 000 ms) avant de recommencer la boucle
                    setTimeout(cycle, 180000);

                }, 30000);
            }, 60000);
        }

        window.onload = cycle;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle Live OBS - 3 Sources Synchronisées</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: transparent;
        }
        .overlay-item {
            width: 1080px;
            height: 1920px;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.5s ease-in-out;
            opacity: 0;
            pointer-events: none;
        }
        .active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <iframe id="source1" class="overlay-item" src=""></iframe>

    <img id="source2" class="overlay-item" src="file_00000000c15071f4829de158d17f3c07.png" alt="Transition">

    <iframe id="source3" class="overlay-item" src=""></iframe>

    <script>
        const s1 = document.getElementById('source1'); // Dettes
        const s2 = document.getElementById('source2'); // Transition PNG
        const s3 = document.getElementById('source3'); // News

        // Configuration des temps (en millisecondes)
        const tempsDettes = 60000;     // 1 minute
        const tempsTransition = 30000; // 30 secondes
        const tempsNews = 180000;      // 3 minutes

        function etape1Dettes() {
            console.log("Étape 1 : Affichage Dettes et rechargement force");
            
            // 1. On force le rechargement du fichier HTML des Dettes pour rafraîchir ses données
            s1.src = "24update overlay_live_1080x1920.html";
            
            // 2. On nettoie la source News (pour économiser la mémoire et couper l'ancien code)
            s3.src = ""; 
            s3.classList.remove('active');
            
            // 3. On affiche les Dettes
            s1.classList.add('active');

            setTimeout(etape2Transition, tempsDettes);
        }

        function etape2Transition() {
            console.log("Étape 2 : Affichage Transition PNG");
            
            s1.classList.remove('active');
            s2.classList.add('active');

            setTimeout(etape3News, tempsTransition);
        }

        function etape3News() {
            console.log("Étape 3 : Affichage News et rechargement force depuis GitHub");
            
            // 1. On injecte l'URL pour forcer un rafraîchissement complet (F5) du fichier refresh.html
            s3.src = "refresh.html";
            
            // 2. On coupe le fichier Dettes en arrière-plan
            s1.src = "";
            s2.classList.remove('active');
            
            // 3. On affiche les News
            s3.classList.add('active');

            // Au bout de 3 minutes, on recommence
            setTimeout(etape1Dettes, tempsNews);
        }

        window.onload = function() {
            etape1Dettes();
        };
    </script>
</body>
</html>

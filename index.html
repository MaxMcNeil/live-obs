<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle Live OBS - 3 Sources Automatiques</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: transparent;
        }

        .overlay-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 1080px;
            height: 1920px;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease-in-out;
        }

        .active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- Source 1 -->
    <iframe
        id="source1"
        class="overlay-item"
        src="24update overlay_live_1080x1920.html">
    </iframe>

    <!-- Transition -->
    <img
        id="source2"
        class="overlay-item"
        src="file_00000000c15071f4829de158d17f3c07.png"
        alt="Transition">

    <!-- France Live News -->
    <iframe
        id="source3"
        class="overlay-item"
        src="https://maxmcneil.github.io/FranceLiveNews/">
    </iframe>

<script>
const s1 = document.getElementById("source1");
const s2 = document.getElementById("source2");
const s3 = document.getElementById("source3");

// Durées
const tempsSource1 = 30000;      // 30 s
const tempsTransition = 5000;    // 5 s
const tempsNews = 60000;         // 1 min

// Rafraîchissement des iframes toutes les 20 min
const refreshInterval = 20 * 60 * 1000;

// Rafraîchissement automatique
setInterval(() => {
    console.log("Rafraîchissement des iframes...");

    s1.src = "";
    s3.src = "";

    setTimeout(() => {
        s1.src = "24update overlay_live_1080x1920.html";
        s3.src = "https://maxmcneil.github.io/FranceLiveNews/";
    }, 100);

}, refreshInterval);

// Étape 1
function afficherSource1() {
    console.log("Source 1");

    s2.classList.remove("active");
    s3.classList.remove("active");
    s1.classList.add("active");

    setTimeout(afficherTransition, tempsSource1);
}

// Étape 2
function afficherTransition() {
    console.log("Transition");

    s1.classList.remove("active");
    s2.classList.add("active");

    setTimeout(afficherNews, tempsTransition);
}

// Étape 3
function afficherNews() {
    console.log("France Live News");

    s2.classList.remove("active");
    s3.classList.add("active");

    setTimeout(afficherSource1, tempsNews);
}

// Démarrage
window.onload = () => {
    afficherSource1();
};
</script>

</body>
</html>

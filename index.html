<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle Live OBS</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            overflow: hidden;
            background: transparent;
        }

        .overlay-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 1080px;
            height: 1920px;
            border: none;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease-in-out;
        }

        .active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <iframe id="s0" class="overlay-item" src="24update overlay_live_1080x1920.html"></iframe>
    <img id="s1" class="overlay-item" src="file_00000000c15071f4829de158d17f3c07.png" alt="Transition">
    <iframe id="s2" class="overlay-item" src="https://maxmcneil.github.io/FranceLiveNews/"></iframe>
    <iframe id="s3" class="overlay-item" src="https://maxmcneil.github.io/dls-monitor/"></iframe>

<script>
const cycle = [
    { id: "s0", duration: 35000 },
    { id: "s1", duration: 20000 },
    { id: "s2", duration: 90000 },
    { id: "s3", duration: 90000 }
];

let currentIndex = 0;

function afficherSource() {
    document.querySelectorAll('.overlay-item').forEach(el => el.classList.remove('active'));
    document.getElementById(cycle[currentIndex].id).classList.add('active');

    setTimeout(() => {
        currentIndex = (currentIndex + 1) % cycle.length;
        afficherSource();
    }, cycle[currentIndex].duration);
}

// Rafraîchissement des iframes toutes les 15 min
setInterval(() => {
    console.log("Rafraîchissement...");
    document.querySelectorAll('iframe').forEach(iframe => {
        const url = iframe.src;
        iframe.src = "";
        setTimeout(() => { iframe.src = url; }, 100);
    });
}, 15 * 60 * 1000);

window.onload = afficherSource;
</script>

</body>
</html>
